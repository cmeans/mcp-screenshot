<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(230, 250)">
    <!-- Screen -->
    <rect x="-124" y="-124" width="248" height="196" rx="16" fill="#0ea5e9" fill-opacity="0.06" stroke="#0ea5e9" stroke-width="5"/>
    <!-- Bezel hint -->
    <line x1="-60" y1="72" x2="60" y2="72" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <!-- Stand -->
    <line x1="0" y1="72" x2="0" y2="100" stroke="#0ea5e9" stroke-width="5"/>
    <line x1="-44" y1="100" x2="44" y2="100" stroke="#0ea5e9" stroke-width="6" stroke-linecap="round"/>

    <!-- User bubble -->
    <rect x="16" y="-100" width="72" height="20" rx="10" fill="#0ea5e9" fill-opacity="0.2"/>
    <line x1="28" y1="-90" x2="76" y2="-90" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

    <!-- Ghost: where the diagram was -->
    <rect x="-96" y="-72" width="104" height="80" rx="8" fill="none" stroke="#38bdf8" stroke-width="3.5" stroke-dasharray="10 7"/>
    <!-- Faint ghost boxes -->
    <rect x="-84" y="-60" width="32" height="20" rx="5" fill="#0ea5e9" fill-opacity="0.05" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
    <rect x="-84" y="-20" width="32" height="20" rx="5" fill="#0ea5e9" fill-opacity="0.05" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
    <rect x="-32" y="-40" width="32" height="20" rx="5" fill="#0ea5e9" fill-opacity="0.05" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>

    <!-- AI text below -->
    <line x1="-96" y1="20" x2="-12" y2="20" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round" opacity="0.15"/>
    <line x1="-96" y1="40" x2="-32" y2="40" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round" opacity="0.12"/>
    <line x1="-96" y1="60" x2="-48" y2="60" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round" opacity="0.09"/>

    <!-- Extracted diagram — floating up-right -->
    <g transform="translate(56, -124)">
      <rect x="-52" y="-40" width="104" height="80" rx="10" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-width="6"/>
      <!-- Boxes -->
      <rect x="-36" y="-28" width="32" height="20" rx="5" fill="#0ea5e9" fill-opacity="0.35" stroke="#0ea5e9" stroke-width="3"/>
      <rect x="-36" y="12" width="32" height="20" rx="5" fill="#38bdf8" fill-opacity="0.35" stroke="#38bdf8" stroke-width="3"/>
      <rect x="16" y="-8" width="32" height="20" rx="5" fill="#0ea5e9" fill-opacity="0.35" stroke="#0ea5e9" stroke-width="3"/>
      <!-- Arrows -->
      <line x1="-4" y1="-12" x2="12" y2="-2" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>
      <line x1="-4" y1="16" x2="12" y2="6" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>
      <!-- Arrow tips -->
      <path d="M10,-4 L16,0 L10,4" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10,4 L16,8 L10,12" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>