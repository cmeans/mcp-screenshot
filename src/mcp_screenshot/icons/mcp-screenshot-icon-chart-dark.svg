<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(230, 250)">
    <!-- Screen -->
    <rect x="-124" y="-124" width="248" height="196" rx="16" fill="#7dd3fc" fill-opacity="0.08" stroke="#7dd3fc" stroke-width="5"/>
    <!-- Bezel hint -->
    <line x1="-60" y1="72" x2="60" y2="72" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <!-- Stand -->
    <line x1="0" y1="72" x2="0" y2="100" stroke="#7dd3fc" stroke-width="5"/>
    <line x1="-44" y1="100" x2="44" y2="100" stroke="#7dd3fc" stroke-width="6" stroke-linecap="round"/>

    <!-- User bubble (right-aligned) -->
    <rect x="16" y="-100" width="72" height="20" rx="10" fill="#7dd3fc" fill-opacity="0.2"/>
    <line x1="28" y1="-90" x2="76" y2="-90" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

    <!-- Ghost: where the chart was -->
    <rect x="-96" y="-72" width="100" height="76" rx="8" fill="none" stroke="#bae6fd" stroke-width="3.5" stroke-dasharray="10 7"/>
    <!-- Faint ghost bars -->
    <rect x="-80" y="-20" width="14" height="20" rx="3" fill="#7dd3fc" fill-opacity="0.08"/>
    <rect x="-60" y="-36" width="14" height="36" rx="3" fill="#7dd3fc" fill-opacity="0.08"/>
    <rect x="-40" y="-48" width="14" height="48" rx="3" fill="#7dd3fc" fill-opacity="0.08"/>
    <rect x="-20" y="-28" width="14" height="28" rx="3" fill="#7dd3fc" fill-opacity="0.08"/>

    <!-- AI text below chart area -->
    <line x1="-96" y1="16" x2="-12" y2="16" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" opacity="0.15"/>
    <line x1="-96" y1="36" x2="-32" y2="36" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" opacity="0.12"/>
    <line x1="-96" y1="56" x2="-48" y2="56" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" opacity="0.09"/>

    <!-- Extracted chart — floating up-right -->
    <g transform="translate(60, -124)">
      <rect x="-50" y="-38" width="100" height="76" rx="10" fill="#7dd3fc" fill-opacity="0.15" stroke="#7dd3fc" stroke-width="6"/>
      <!-- Axis lines -->
      <line x1="-36" y1="28" x2="40" y2="28" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <line x1="-36" y1="-24" x2="-36" y2="28" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <!-- Bars -->
      <rect x="-28" y="4" width="14" height="24" rx="3" fill="#7dd3fc" fill-opacity="0.45"/>
      <rect x="-8" y="-12" width="14" height="40" rx="3" fill="#7dd3fc" fill-opacity="0.55"/>
      <rect x="12" y="-20" width="14" height="48" rx="3" fill="#bae6fd" fill-opacity="0.65"/>
      <rect x="32" y="-4" width="14" height="32" rx="3" fill="#7dd3fc" fill-opacity="0.45"/>
    </g>
  </g>
</svg>
